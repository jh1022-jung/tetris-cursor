<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>테트리스</h1>
    </header>

    <main class="game-area">
      <section class="board-section">
        <div id="game-board" class="game-board" aria-label="테트리스 게임 보드"></div>
      </section>

      <aside class="info-panel">
        <div class="score-box">
          <h2>점수</h2>
          <p id="score" class="score-value" aria-live="polite">0</p>
          <p id="game-status" class="game-status" aria-live="polite"></p>
        </div>

        <div class="button-group">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </div>

        <div class="controls-guide">
          <h2>조작법</h2>
          <p class="controls-note">게임 진행 중에만 적용됩니다. 충돌 시 이동·회전은 취소됩니다.</p>
          <ul>
            <li><kbd>←</kbd> ArrowLeft : 왼쪽 이동</li>
            <li><kbd>→</kbd> ArrowRight : 오른쪽 이동</li>
            <li><kbd>↓</kbd> ArrowDown : 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> ArrowUp : 회전</li>
            <li><kbd>Space</kbd> : 즉시 낙하 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
